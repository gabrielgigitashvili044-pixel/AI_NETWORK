<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Network — Live Demo</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #0a0a0a;
  color: #e5e5e5;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  max-width: 640px;
  width: 100%;
}
h1 {
  font-size: 2.5rem;
  margin-bottom: 8px;
  background: linear-gradient(90deg, #9945FF, #14F195);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subtitle {
  color: #888;
  margin-bottom: 40px;
  font-size: 1rem;
}
.card {
  background: #141414;
  border: 1px solid #222;
  border-radius: 12px;
  padding: 28px;
  margin-bottom: 20px;
}
.step {
  color: #14F195;
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 1px;
  margin-bottom: 12px;
}
label {
  display: block;
  color: #aaa;
  font-size: 0.85rem;
  margin-bottom: 8px;
  margin-top: 16px;
}
input {
  width: 100%;
  padding: 12px 14px;
  background: #0a0a0a;
  border: 1px solid #333;
  border-radius: 8px;
  color: #fff;
  font-size: 0.95rem;
  font-family: monospace;
}
input:focus {
  outline: none;
  border-color: #9945FF;
}
button {
  background: linear-gradient(90deg, #9945FF, #14F195);
  color: #000;
  border: none;
  padding: 14px 28px;
  border-radius: 8px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  margin-top: 20px;
  width: 100%;
}
button:hover { opacity: 0.9; }
button:disabled { opacity: 0.5; cursor: not-allowed; }
.result {
  margin-top: 20px;
  padding: 16px;
  background: #0a0a0a;
  border: 1px solid #222;
  border-radius: 8px;
  font-family: monospace;
  font-size: 0.85rem;
  white-space: pre-wrap;
  word-break: break-all;
  color: #14F195;
  display: none;
}
.error { color: #ff5555; }
.footer {
  text-align: center;
  color: #555;
  font-size: 0.85rem;
  margin-top: 30px;
}
.footer a { color: #9945FF; text-decoration: none; }
</style>
</head>
<body>
<div class="container">
  <h1>AI Network</h1>
  <p class="subtitle">Live demo — send a real Solana transaction in 2 clicks</p>

  <div class="card">
    <div class="step">STEP 1 — GET API KEY</div>
    <label>Your name</label>
    <input id="name" type="text" placeholder="e.g. Alice" value="Demo_User">
    <button onclick="getKey()">Get API Key</button>
    <div class="result" id="keyResult"></div>
  </div>

  <div class="card">
    <div class="step">STEP 2 — SEND SOL</div>
    <label>Receiver wallet address</label>
    <input id="receiver" type="text" value="4rKw12fFcXpjvGwdEEzWF1dsCxM8ZWAmtzHksWvLC7DN">
    <label>Amount (SOL)</label>
    <input id="amount" type="text" value="0.001">
    <button onclick="sendTx()" id="sendBtn" disabled>Send Transaction</button>
    <div class="result" id="txResult"></div>
  </div>

  <div class="footer">
    Running on Solana devnet · <a href="https://github.com/gabrielgigitashvili044-pixel/AI_NETWORK" target="_blank">GitHub</a>
  </div>
</div>

<script>
const API = "https://ai-network-api.onrender.com";
let apiKey = null;

async function getKey() {
  const name = document.getElementById("name").value;
  const result = document.getElementById("keyResult");
  result.style.display = "block";
  result.className = "result";
  result.textContent = "Loading... (first request may take 50s on free tier)";
  try {
    const r = await fetch(API + "/api/v1/register", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({name})
    });
    const data = await r.json();
    if (data.api_key) {
      apiKey = data.api_key;
      result.textContent = "✓ API Key: " + apiKey;
      document.getElementById("sendBtn").disabled = false;
    } else {
      result.className = "result error";
      result.textContent = "Error: " + JSON.stringify(data);
    }
  } catch (e) {
    result.className = "result error";
    result.textContent = "Error: " + e.message;
  }
}

async function sendTx() {
  const receiver = document.getElementById("receiver").value;
  const amount = parseFloat(document.getElementById("amount").value);
  const result = document.getElementById("txResult");
  result.style.display = "block";
  result.className = "result";
  result.textContent = "Sending...";
  try {
    const r = await fetch(API + "/api/v1/transfer", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-API-Key": apiKey
      },
      body: JSON.stringify({sender: "Demo_Agent", receiver, amount})
    });
    const data = await r.json();
    if (data.status === "success") {
      result.textContent = "✓ Transfer complete! Check Solana Explorer: https://explorer.solana.com/address/" + receiver + "?cluster=devnet";
    } else {
      result.className = "result error";
      result.textContent = "Error: " + JSON.stringify(data);
    }
  } catch (e) {
    result.className = "result error";
    result.textContent = "Error: " + e.message;
  }
}
</script>
</body>
</html>
